name: AXIONYX Observatory CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Run Tests
      run: npm run test

    - name: Build Application
      run: npm run build
      env:
        # Provide any necessary build-time environment variables here
        NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
        LOG_LEVEL: "info"
        REGISTRY_STORAGE: "json"
        API_VERSION: "v1"
